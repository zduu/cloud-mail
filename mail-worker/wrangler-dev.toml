name = "cloud-mail-dev"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[dev]
ip = "0.0.0.0"

[[d1_databases]]
binding = "db"
database_name = "email"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "kv"
id = "00000000000000000000000000000000"

#[[r2_buckets]]
#binding = "r2"
#bucket_name = "email"

#[ai]
#binding = "ai"

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

#[[send_email]]
#name = "email"


[vars]
ai_model = ""
analysis_cache = false
orm_log = false
domain = ["example.com", "example2.com", "example3.com", "example4.com"]
admin = "admin@example.com"
jwt_secret = "local-development-only-change-me"
